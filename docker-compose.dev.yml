version: '3.8'

services:
  mysql-dev:
    image: mysql:8.0
    container_name: lms-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lms_db_dev
      MYSQL_USER: lms_user
      MYSQL_PASSWORD: lms_password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - lms-network-dev

volumes:
  mysql_dev_data:

networks:
  lms-network-dev:
    driver: bridge
